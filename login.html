<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Sign in — Field Op</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #080c14;
      color: #f1f5f9;
      font-family: 'Barlow', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 360px;
      background: #0f1729;
      border: 1px solid #1e3a5f;
      border-radius: 24px;
      padding: 36px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 16px 60px rgba(0,0,0,.7);
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #67e8f9;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      text-align: center;
      line-height: 1.5;
    }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-google:hover { background: #f1f1f1; }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
    .guest-link {
      font-size: 0.8rem;
      color: #64748b;
      text-decoration: none;
      cursor: pointer;
    }
    .guest-link:hover { color: #94a3b8; }
    .status {
      font-size: 0.8rem;
      color: #94a3b8;
      min-height: 1.2em;
      text-align: center;
    }
    .status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Field Op</div>
    <p class="subtitle">Sign in to track your stats,<br>earn achievements, and view your history.</p>
    <button class="btn-google" id="btnGoogle">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
    <div class="status" id="status"></div>
    <a class="guest-link" href="./index.html">← Play as guest</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://rxnljetuukqtlmauuruz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_oM6zcplDuEfB1vowTdnUDg_Uxdf0ulm';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already signed in, redirect back to game
    client.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.replace('./index.html');
    });

    document.getElementById('btnGoogle').addEventListener('click', async () => {
      const status = document.getElementById('status');
      status.textContent = 'Redirecting to Google…';
      status.className = 'status';
      const { error } = await client.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://zirconixuk.github.io/map-game/' },
      });
      if (error) {
        status.textContent = error.message || 'Sign-in failed. Please try again.';
        status.className = 'status error';
      }
    });
  </script>
</body>
</html>
